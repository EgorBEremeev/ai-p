<header class="site-nav">
    <a class="nav-brand" href="{{ site.baseurl }}/ru/">AI-P</a>
    <nav class="nav-items" id="nav-items">
        <a href="{{ site.baseurl }}/ru/"{% if page.nav_active == "manifesto" %} class="active"{% endif %}>Манифест</a>
        <a href="{{ site.baseurl }}/ru/conceptual-model/"{% if page.nav_active == "model" %} class="active"{% endif %}>Модель AI-P</a>
        <a href="{{ site.baseurl }}/ru/subjectivity-spectrum/"{% if page.nav_active == "spectrum" %} class="active"{% endif %}>Спектр субъектности</a>
        <a href="{{ site.baseurl }}/ru/architectural-atlas/" class="disabled{% if page.nav_active == "atlas" %} active{% endif %}">Архитектурный атлас</a>
    </nav>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu" aria-expanded="false">&#9776;</button>
    <div class="lang-switch">
        <a href="{{ site.baseurl }}/ru/"{% if page.lang == "ru" %} class="active"{% endif %}>RU</a>
        <span class="separator">|</span>
        <a href="{{ site.baseurl }}/en/"{% if page.lang == "en" %} class="active"{% endif %}>EN</a>
    </div>
</header>
<div class="nav-dropdown" id="nav-dropdown">
    <a href="{{ site.baseurl }}/ru/"{% if page.nav_active == "manifesto" %} class="active"{% endif %}>Манифест</a>
    <a href="{{ site.baseurl }}/ru/conceptual-model/"{% if page.nav_active == "model" %} class="active"{% endif %}>Модель AI-P</a>
    <a href="{{ site.baseurl }}/ru/subjectivity-spectrum/"{% if page.nav_active == "spectrum" %} class="active"{% endif %}>Спектр субъектности</a>
    <a href="{{ site.baseurl }}/ru/architectural-atlas/" class="disabled{% if page.nav_active == "atlas" %} active{% endif %}">Архитектурный атлас</a>
</div>
<script>
(function() {
    var btn = document.getElementById('nav-hamburger');
    var dropdown = document.getElementById('nav-dropdown');
    if (btn && dropdown) {
        btn.addEventListener('click', function() {
            var expanded = btn.getAttribute('aria-expanded') === 'true';
            btn.setAttribute('aria-expanded', String(!expanded));
            dropdown.classList.toggle('open');
        });
    }
})();
</script>
